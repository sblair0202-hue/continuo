name: Backend Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Import app
        run: |
          cd backend
          python -c "from app.main import app; print(app.title)"
